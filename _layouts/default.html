<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
    <!-- Load modern font: Outfit for a technical, modern feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <header class="glass-nav">
        <div class="container nav-container">
            <a href="{{ '/' | relative_url }}" class="logo">Fantasy Printing <span>Art</span></a>
            <nav>
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/dragons.html' | relative_url }}">Dragons</a>
                <a href="{{ '/fidgets.html' | relative_url }}">Fidgets</a>
                <a href="{{ '/merch.html' | relative_url }}">Merch</a>
                <a href="{{ '/practical.html' | relative_url }}">Practical</a>
                <a href="#contact" class="btn-primary">Contact Me</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer class="footer">
        <div class="container footer-container">
            <p>&copy; {{ site.time | date: '%Y' }} Fantasy Printing Art.</p>
            <div class="social-links">
                <!-- Social and Contact Links -->
                <a href="https://www.facebook.com/profile.php?id=61588578691371" target="_blank" aria-label="Facebook">📘 Facebook</a>
                <a href="https://www.instagram.com/fantasyprintingart/" target="_blank" aria-label="Instagram">📸 Instagram</a>
                <a href="mailto:h3rr.der.augenringe@googlemail.com" aria-label="Email">✉️ Email</a>
            </div>
        </div>
    </footer>
    <!-- Lightbox Modal -->
    <div id="lightbox-modal" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var modal = document.getElementById("lightbox-modal");
        var modalImg = document.getElementById("lightbox-img");
        var closeBtn = document.getElementsByClassName("lightbox-close")[0];
        
        var images = document.querySelectorAll("img.media-item");
        
        images.forEach(function(img) {
            img.style.cursor = "zoom-in";
            img.onclick = function(){
                modal.style.display = "flex";
                modalImg.src = this.src;
            }
        });

        if(closeBtn) {
            closeBtn.onclick = function() {
                modal.style.display = "none";
            }
        }
        
        if(modal) {
            modal.onclick = function(e) {
                if(e.target === modal) {
                    modal.style.display = "none";
                }
            }
        }
    });
    </script>
</body>
</html>
